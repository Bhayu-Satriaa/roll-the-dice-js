<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Roll The Dice Game</title>
  </head>
  <body>
    <main>
      <section class="player player--0 player--active">
        <h2 class="name" id="name--0">Player 1</h2>
        <p class="score" id="score--0">0</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--0">0</p>
        </div>
      </section>
      <section class="player player--1">
        <h2 class="name" id="name--1">Player 2</h2>
        <p class="score" id="score--1">0</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--1">0</p>
        </div>
      </section>

      <img src="assets/dice-1.png" alt="Playing dice" class="dice" />
      <button class="btn btn--new">&#x1F3B2; New game</button>
      <button class="btn btn--roll">&#x1F3B2; Roll dice</button>
      <button class="btn btn--hold">&#x1F4BE; Hold</button>

        <input
        type="text"
        class="btn btn--turn-indicator"
        value="Turn:"
        readonly
      />

</main>


    <!-- Winner Modal -->
    <div class="modal hidden" id="winner-modal">
      <p class="winner-text" id="winner-text">Player 1 Wins! 🎉</p>
      <button class="btn btn--close-modal">Play Again</button>
    </div>
    <div class="overlay hidden" id="overlay"></div>

    <!-- Confirm New Game Modal -->
    <div class="modal modal--confirm hidden" id="confirm-modal">
      <p class="winner-text">Start a new game?</p>
      <p class="confirm-subtext">Current progress will be lost!</p>
      <div class="confirm-buttons">
        <button class="btn--confirm-yes">Yes, restart!</button>
        <button class="btn--confirm-no">Cancel</button>
      </div>
    </div>
    <div class="overlay overlay--confirm hidden" id="overlay-confirm"></div>


    <script src="script.js"></script>
  </body>
</html>
